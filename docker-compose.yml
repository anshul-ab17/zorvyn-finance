services:
  postgres:
    image: postgres:16-alpine
    container_name: zorvyn-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: zorvyn
      POSTGRES_PASSWORD: zorvyn_secret
      POSTGRES_DB: zorvyn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zorvyn-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
